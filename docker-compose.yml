services:
  postgres:
    image: postgres:16
    container_name: bridge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bridge
      POSTGRES_USER: bridge
      POSTGRES_PASSWORD: bridge
    ports:
      - "5432:5432"
    volumes:
      - bridge-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bridge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - bridge-redis:/data

volumes:
  bridge-postgres:
  bridge-redis:
